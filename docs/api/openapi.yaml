openapi: 3.1.0
info:
  title: 8P3P Control Layer API
  description: |
    REST API for the 8P3P Learning Intelligence Control Layer.
    Lifecycle: Ingestion → Signal Log → STATE Engine → Decision Engine → Output.

    **Authentication:** When API_KEY env is set, all /v1/* endpoints require the x-api-key header.
    Endpoints show a lock icon; when you have not authorized they appear grey (401 if you try). After you click Authorize and enter a valid key, the locks turn **green** to show you have access.
    When API_KEY is unset (local dev), auth is disabled.
    When API_KEY_ORG_ID is set, request org_id is overridden server-side (one org per key); when unset, client org_id is used.
  version: 1.0.0
  license:
    name: ISC
    identifier: ISC

security:
  - ApiKeyAuth: []

servers:
  - url: /
    description: Base path (version prefix applied per route)

tags:
  - name: Health
    description: Liveness and readiness checks.
  - name: Signal
    description: Signal log query operations.
  - name: Ingest
    description: Signal ingestion and ingestion-outcome inspection operations.
  - name: State
    description: Learner state inspection operations.
  - name: Learner
    description: Learner-centric aggregation endpoints. Combines state, decisions, trajectories, policy, and signal counts in a single read.
  - name: Decision
    description: Decision output query operations.
  - name: Policy
    description: |
      Read-only policy inspection for tenant orgs. Requires `x-api-key` header (same as all `/v1/*` endpoints).
      Use to list active policies and inspect rule definitions before or after sending signals.
  - name: AdminPolicy
    description: |
      Admin policy lifecycle management. Requires `x-admin-api-key` header on all endpoints.
      Tenant `x-api-key` is **not** accepted — 401 is returned for tenant-key requests.
      Endpoints create, replace, toggle, validate, delete, and list policies in DynamoDB PoliciesTable.
  - name: AdminMapping
    description: |
      Admin tenant field mapping lifecycle management (v1.1). Requires `x-admin-api-key` header on all endpoints.
      Tenant `x-api-key` is **not** accepted — 401 is returned for tenant-key requests.
      Endpoints upsert and list tenant payload mappings (aliases, required fields, type checks, computed transforms)
      in DynamoDB `FieldMappingsTable`, keyed by `org_id` + `source_system`.
  - name: AdminIngestion
    description: |
      Admin ingestion tooling endpoints. Requires `x-admin-api-key` header on all endpoints.
      Tenant `x-api-key` is **not** accepted — 401 is returned for tenant-key requests.
      Provides dry-run inspection of raw payloads against forbidden-key rules and tenant field mappings
      without writing to the Signal Log, idempotency store, or ingestion outcome log.

paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Health check
      description: |
        **What it does:** Returns a simple liveness/readiness payload. No authentication required.

        **When to use:** Use for load balancer health checks, container orchestration (e.g. Kubernetes liveness/readiness), or monitoring to confirm the API is up.

        **How:** GET with no query parameters or headers. Returns 200 with `{ "status": "ok" }`.
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/signals:
    post:
      tags: [Ingest]
      operationId: ingestSignal
      summary: Ingest a signal
      description: |
        **What it does:** Accepts a single learning-event signal from your system. Validates structure and semantic rules (timestamp format, schema_version, forbidden keys), enforces idempotency by (org_id, signal_id), then appends to the Signal Log and triggers the STATE → Decision pipeline.

        **When to use:** Send every learning event (LMS activity, assessment, compliance checkpoint, etc.) to 8P3P as it happens. Use this as the primary integration point from your systems into the control layer. Safe to retry — duplicate signal_id returns 200 with status `duplicate` and does not create a second decision.

        **How:** One signal per request; include org_id, signal_id, source_system, learner_reference, timestamp, schema_version, and payload. See docs/specs/signal-ingestion.md.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignalEnvelope'
      responses:
        '200':
          description: Signal accepted or duplicate (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalIngestResult'
        '401':
          description: Unauthorized (missing or invalid API key)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum: [api_key_required, api_key_invalid]
                  message:
                    type: string
        '400':
          description: Validation failed (structural or enforced semantic constraints)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalIngestResult'
              example:
                org_id: ''
                signal_id: ''
                status: rejected
                received_at: '2026-02-07T12:00:00Z'
                rejection_reason:
                  code: missing_required_field
                  message: "Required field 'learner_reference' is missing"
                  field_path: /learner_reference
    get:
      tags: [Signal]
      operationId: querySignals
      summary: Query the signal log
      description: |
        **What it does:** Returns the immutable, append-only list of signals stored for a learner within a time range. This is the raw evidence stream — what was sent and accepted — not the derived state or decisions.

        **When to use:** When you need to see exactly which events were ingested for a learner (e.g. debugging integration, auditing what data fed into state, or rebuilding your own view of the evidence). Use GET /v1/decisions when you need the control layer's decisions; use GET /v1/state when you need the accumulated state.

        **How:** Supply org_id, learner_reference, from_time, and to_time (RFC3339). Paginate with page_token and page_size. See docs/specs/signal-log.md.
      parameters:
        - name: org_id
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
          description: Organization identifier (required for tenant isolation)
        - name: learner_reference
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 256
          description: Learner identifier
        - name: from_time
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Start of time window (RFC3339, timezone required)
        - name: to_time
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: End of time window (RFC3339, must be >= from_time)
        - name: page_token
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination token from previous response
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          description: Results per page (1-1000)
        - name: skill
          in: query
          required: false
          schema:
            type: string
          description: Filter by skill name (matches payload.skill). E.g. "fractions".
        - name: assessment_type
          in: query
          required: false
          schema:
            type: string
          description: Filter by assessment type (matches payload.assessment_type). E.g. "diagnostic", "formative".
      responses:
        '200':
          description: Signal log query result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalLogReadResponse'
        '401':
          description: Unauthorized (missing or invalid API key)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum: [api_key_required, api_key_invalid]
                  message:
                    type: string
        '400':
          description: Invalid query (time range, page_size, org_id, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalLogError'

  /v1/webhooks/{source_system}:
    post:
      tags: [Ingest]
      operationId: ingestWebhook
      summary: Ingest a raw LMS webhook
      description: |
        **What it does:** Accepts a raw LMS webhook payload, extracts envelope fields using a declarative
        config stored in FieldMappingsTable, constructs a valid SignalEnvelope, and passes it to the
        existing ingestion pipeline (same logic as POST /v1/signals — no duplication).

        **When to use:** Configure your LMS (Canvas, iReady, Branching Minds, etc.) to fire webhooks at
        this endpoint. No client-side SignalEnvelope construction required — the adapter handles extraction.

        **How:** POST the raw LMS webhook body with `x-api-key` header. The source_system path parameter
        must match a configured envelope mapping in FieldMappingsTable.
      parameters:
        - name: source_system
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 64
          description: LMS identifier matching a configured envelope mapping (e.g. canvas-lms, iready)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Raw LMS webhook JSON body (opaque to 8P3P; transformed via envelope mapping config)
            example:
              submission:
                id: sub_98765
                user_id: canvas_student_001
                submitted_at: '2026-03-28T10:30:00Z'
                score: 68
                assignment:
                  points_possible: 100
              event_type: submission_created
      responses:
        '200':
          description: Signal accepted or duplicate (same shape as POST /v1/signals)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalIngestResult'
              example:
                org_id: springs
                signal_id: sub_98765
                source_system: canvas-lms
                status: accepted
                received_at: '2026-03-28T10:30:01Z'
        '204':
          description: Event type filtered out (silently dropped). No body. No signal created, no LIU consumed.
        '400':
          description: Missing envelope mapping or envelope extraction failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        enum: [missing_envelope_mapping, envelope_extraction_failed, payload_not_object]
                      message:
                        type: string
                    required: [code, message]
              examples:
                missing_mapping:
                  summary: No envelope mapping configured
                  value:
                    error:
                      code: missing_envelope_mapping
                      message: "No envelope mapping configured for org 'springs' + source_system 'canvas-lms'. Use PUT /v1/admin/mappings/springs/canvas-lms to configure."
                extraction_failed:
                  summary: Envelope extraction failure
                  value:
                    error:
                      code: envelope_extraction_failed
                      message: "Cannot extract learner_reference: path 'submission.user_id' not found in webhook body."
        '401':
          description: Unauthorized (missing or invalid API key)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum: [api_key_required, api_key_invalid]
                  message:
                    type: string

  /v1/ingestion:
    get:
      tags: [Ingest]
      operationId: getIngestionOutcomes
      summary: Query ingestion outcomes
      description: |
        **What it does:** Returns a log of all ingestion attempts for your org — accepted, rejected, and duplicate — with optional filter by outcome. Includes validation failure details for rejected signals.

        **When to use:** Debugging integration issues (why a signal was rejected), monitoring ingestion health, or auditing what arrived and what failed. This is an inspection/debug endpoint, not the primary path for consuming decisions. For decision output, use GET /v1/decisions or GET /v1/receipts.

        **How:** Supply org_id; optionally limit, outcome (accepted | rejected | duplicate), and cursor for pagination. Results are most recent first. See docs/specs/inspection-api.md §1.
      parameters:
        - name: org_id
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
          description: Organization identifier
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
          description: Results per page (1-500)
        - name: outcome
          in: query
          required: false
          schema:
            type: string
            enum: [accepted, rejected, duplicate]
          description: Optional outcome filter
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination cursor from previous response
      responses:
        '200':
          description: Ingestion outcomes for org (most recent first)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionLogResponse'
        '400':
          description: Invalid query (org_id, limit, outcome, cursor)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionError'
        '401':
          description: Unauthorized (missing or invalid API key)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum: [api_key_required, api_key_invalid]
                  message:
                    type: string

  /v1/state:
    get:
      tags: [State]
      operationId: getState
      summary: Get learner state
      description: |
        **What it does:** Returns a single learner's current STATE (or a specific version by version number). STATE is the control layer's accumulated view of that learner — merged from all applied signals — and is the input to the decision engine.

        **When to use:** When you need to inspect or reason about the learner's current state (e.g. dashboards, support tools, or verifying what the engine "sees"). Use GET /v1/decisions to get the decisions produced from this state; use GET /v1/signals to see the raw signal stream that built it.

        **How:** Supply org_id and learner_reference; omit version for latest, or set version for a historical snapshot. See docs/specs/inspection-api.md §2.
      parameters:
        - name: org_id
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
          description: Organization identifier
        - name: learner_reference
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 256
          description: Learner identifier
        - name: version
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Specific state version; omit for current (latest)
      responses:
        '200':
          description: Learner state (current or requested version)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearnerState'
        '400':
          description: Invalid query (org_id, learner_reference)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateError'
        '401':
          description: Unauthorized (missing or invalid API key)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum: [api_key_required, api_key_invalid]
                  message:
                    type: string
        '404':
          description: No state for learner, or requested version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateError'

  /v1/state/list:
    get:
      tags: [State]
      operationId: listLearners
      summary: List learners for an org
      description: |
        **What it does:** Returns a paginated list of learner_reference values that have at least one state record in your org, with each learner's latest state_version and updated_at.

        **When to use:** When you need to enumerate learners (e.g. to fan out and fetch decisions per learner via GET /v1/decisions, or to build org-wide reports). Use GET /v1/state when you need the full state for a specific learner.

        **How:** Supply org_id; optionally limit (1–500) and cursor for pagination. See docs/specs/inspection-api.md §2.2 and docs/guides/customers/get-all-learner-decisions-from-org.md for the fan-out pattern.
      parameters:
        - name: org_id
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
          description: Organization identifier
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
          description: Results per page (1-500)
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination cursor from previous response
      responses:
        '200':
          description: Learner index
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateSummaryListResponse'
        '400':
          description: Invalid query (org_id, limit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateError'
        '401':
          description: Unauthorized (missing or invalid API key)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum: [api_key_required, api_key_invalid]
                  message:
                    type: string

  /v1/state/trajectory:
    get:
      tags: [State]
      operationId: getTrajectory
      summary: Get learner state trajectory
      description: |
        **What it does:** Returns an ordered series of state version entries for a learner, showing how specific fields changed over time. Each version includes the field's value and its stored direction companion (`improving`, `declining`, `stable`, or `null`). A per-page `summary` computes `first_value`, `latest_value`, and `overall_direction` across the returned versions.

        **When to use:** When you need to visualize or analyze how a learner's metrics evolved — e.g. trajectory charts, progress reports, or detecting trends. Use GET /v1/state for the current snapshot; use this endpoint for the historical series.

        **How:** Supply `org_id`, `learner_reference`, and a comma-separated `fields` list (max 10 flat canonical field names). Optionally narrow with `from_version`/`to_version`. Paginate with `page_token` and `page_size`. See docs/specs/learner-trajectory-api.md.

        **Note:** `summary` is computed across versions returned in the current page only. For full-range summaries, consume all pages.
      parameters:
        - name: org_id
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
          description: Organization identifier (required for tenant isolation)
        - name: learner_reference
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 256
          description: Learner identifier
        - name: fields
          in: query
          required: true
          style: form
          explode: false
          schema:
            type: string
          description: |
            Comma-separated list of flat canonical field names to include (e.g. `stabilityScore,masteryScore`).
            Max 10 fields per request. Dot-path fields are not supported in v1.1.
        - name: from_version
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Starting state version (inclusive). Defaults to 1.
        - name: to_version
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Ending state version (inclusive). Defaults to current (latest).
        - name: page_token
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination token from previous response
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Results per page (1–100, default 50)
      responses:
        '200':
          description: Trajectory versions for the requested fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrajectoryResponse'
              example:
                org_id: springs
                learner_reference: learner_001
                fields: [stabilityScore, masteryScore]
                versions:
                  - state_version: 1
                    updated_at: '2026-03-01T10:00:00Z'
                    values:
                      stabilityScore: 0.72
                      masteryScore: 0.65
                    directions:
                      stabilityScore: null
                      masteryScore: null
                  - state_version: 2
                    updated_at: '2026-03-02T10:00:00Z'
                    values:
                      stabilityScore: 0.55
                      masteryScore: 0.70
                    directions:
                      stabilityScore: declining
                      masteryScore: improving
                summary:
                  stabilityScore:
                    first_value: 0.72
                    latest_value: 0.55
                    overall_direction: declining
                    version_count: 2
                  masteryScore:
                    first_value: 0.65
                    latest_value: 0.70
                    overall_direction: improving
                    version_count: 2
                next_page_token: null
        '400':
          description: Invalid query (missing fields, too many fields, dot-path field, invalid version range, bad page_token/page_size)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateError'
              examples:
                too_many_fields:
                  summary: More than 10 fields requested
                  value:
                    code: invalid_format
                    message: 'Maximum 10 fields per trajectory request. Got 14.'
                dot_path_field:
                  summary: Dot-path field not supported in v1.1
                  value:
                    code: invalid_format
                    message: 'Dot-path fields are not supported in v1.1. Use top-level canonical field names.'
                missing_learner:
                  summary: Missing learner_reference
                  value:
                    code: missing_required_field
                    message: "'learner_reference' is required"
                    field_path: learner_reference
        '401':
          description: Unauthorized (missing or invalid API key)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum: [api_key_required, api_key_invalid]
                  message:
                    type: string
        '404':
          description: No state found for learner in org
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateError'
              example:
                code: state_not_found
                message: "No state found for learner 'learner_001' in org 'springs'"

  /v1/learners/{learner_reference}/summary:
    parameters:
      - name: learner_reference
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 256
        description: Learner identifier (pseudonymous — no PII)
    get:
      tags: [Learner]
      operationId: getLearnerSummary
      summary: Get a single aggregated summary for a learner
      description: |
        **What it does:** Returns current state, recent decisions, field trajectories, active policy, and signal-log counts for a learner in a single response. Read-only, no side effects.

        See docs/specs/learner-summary-api.md.
      parameters:
        - name: org_id
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
          description: Organization identifier (required for tenant isolation)
        - name: recent_decisions_limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: Number of recent decisions to include (1–50, default 10)
        - name: trajectory_fields
          in: query
          required: false
          style: form
          explode: false
          schema:
            type: string
          description: |
            Comma-separated list of canonical fields for trajectory summary (max 10).
            Defaults to all numeric fields in current state (excluding `_delta` companions).
      responses:
        '200':
          description: Aggregated learner summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearnerSummaryResponse'
              example:
                org_id: springs
                learner_reference: learner_001
                generated_at: '2026-03-28T15:00:00Z'
                current_state:
                  state_id: springs:learner_001:v3
                  state_version: 3
                  updated_at: '2026-03-28T14:45:00Z'
                  fields:
                    stabilityScore: 0.28
                    masteryScore: 0.75
                    stabilityScore_delta: -0.27
                    stabilityScore_direction: declining
                  mastery_breakdown:
                    overall:
                      masteryScore: 0.75
                      stabilityScore: 0.28
                      subject_count: 1
                      skill_count: 1
                    subjects:
                      General:
                        masteryScore: 0.75
                        stabilityScore: 0.28
                        skill_count: 1
                        strongest_skill: fractions
                        weakest_skill: fractions
                    skills:
                      fractions:
                        subject: General
                        masteryScore: 0.75
                        stabilityScore: 0.28
                        masteryScore_direction: declining
                        evidenceCount: 3
                    learning_gaps: []
                    gifted_interest:
                      flagged: false
                      label: null
                recent_decisions:
                  - decision_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    decision_type: intervene
                    decided_at: '2026-03-28T14:45:30Z'
                    matched_rule_id: rule-decay-intervene
                    educator_summary: Needs stronger support now
                    rationale: 'Rule rule-decay-intervene fired: stabilityScore_delta (-0.27) lt -0.1'
                    policy_version: '1.1.0'
                field_trajectories:
                  stabilityScore:
                    first_value: 0.72
                    latest_value: 0.28
                    overall_direction: declining
                    version_count: 3
                active_policy:
                  policy_id: springs:learner
                  policy_key: learner
                  policy_version: '1.1.0'
                  description: Springs Charter School — learner policy v1.1
                  rule_count: 5
                signals_summary:
                  total_count: 3
                  first_signal_at: '2026-03-01T10:00:00Z'
                  last_signal_at: '2026-03-28T14:44:00Z'
        '400':
          description: Validation error (bad org_id, bad recent_decisions_limit, dot-path or too-many trajectory_fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateError'
        '401':
          description: Missing or invalid x-api-key
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum: [api_key_required, api_key_invalid]
                  message:
                    type: string
        '404':
          description: No state found for the learner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateError'
              example:
                code: state_not_found
                message: "No state found for learner 'learner_001' in org 'springs'"

  /v1/decisions:
    get:
      tags: [Decision]
      operationId: getDecisions
      summary: Get decisions for a learner
      description: |
        **What it does:** Returns the full decision records for a learner within a time range. Each decision includes org_id, decision_id, learner_reference, decision_type, decided_at, decision_context, trace (state snapshot, matched rule, rationale), and output_metadata.

        **When to use:** When your application needs the complete decision object — e.g. to drive workflows, dashboards, or downstream systems that use decision_context or output_metadata. Use GET /v1/receipts when you only need the audit/compliance view (what was decided, when, and why) with a smaller payload.

        **How:** Supply org_id, learner_reference, from_time, and to_time (RFC3339). Paginate with page_token and page_size. Same query semantics as GET /v1/receipts; only the response shape differs.
      parameters:
        - name: org_id
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
          description: Organization identifier
        - name: learner_reference
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 256
          description: Learner identifier
        - name: from_time
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Start of time window (RFC3339)
        - name: to_time
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: End of time window (RFC3339)
        - name: page_token
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination token
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          description: Results per page (1-1000)
        - name: skill
          in: query
          required: false
          schema:
            type: string
          description: Filter by skill name (matches decision_context.skill). Only matches decisions produced after signal_context propagation was deployed.
        - name: assessment_type
          in: query
          required: false
          schema:
            type: string
          description: Filter by assessment type (matches decision_context.assessment_type).
      responses:
        '200':
          description: Decisions in time range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDecisionsResponse'
        '401':
          description: Unauthorized (missing or invalid API key)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum: [api_key_required, api_key_invalid]
                  message:
                    type: string
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalLogError'

  /v1/decisions/{decision_id}/feedback:
    parameters:
      - name: decision_id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Decision]
      operationId: submitDecisionFeedback
      summary: Submit educator feedback (approve / reject / ignore)
      description: |
        Append-only feedback row for a decision. Requires `fb_session` cookie (passphrase gate sibling of `dp_session`) plus `x-api-key`.
        See docs/specs/educator-feedback-api.md.
      security:
        - ApiKeyAuth: []
        - FeedbackSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitFeedbackRequest'
      responses:
        '201':
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitFeedbackResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackValidationError'
        '401':
          description: Missing or invalid API key or session cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackAuthError'
        '404':
          description: Decision not found for this org
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackNotFoundError'
    get:
      tags: [Decision]
      operationId: getDecisionFeedback
      summary: List feedback rows for a decision
      description: Read-only; API key only (no `fb_session` required).
      security:
        - ApiKeyAuth: []
      parameters:
        - name: org_id
          in: query
          required: false
          description: Organization identifier. Omit when `API_KEY_ORG_ID` env override is set (local/test).
          schema:
            type: string
      responses:
        '200':
          description: Feedback rows in created_at ascending order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFeedbackResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum: [api_key_required, api_key_invalid]
                  message:
                    type: string
        '404':
          description: Decision not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackNotFoundError'

  /v1/decisions/{decision_id}/view:
    parameters:
      - name: decision_id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Decision]
      operationId: recordDecisionView
      summary: Record educator opened a decision card
