                $ref: '#/components/schemas/RecordViewResponse'
        '401':
          description: Missing session or API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackAuthError'
        '404':
          description: Decision not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackNotFoundError'

  /v1/decisions/feedback/pending:
    get:
      tags: [Decision]
      operationId: getPendingFeedback
      summary: Count unreviewed decisions (soft nudge)
      description: |
        On DynamoDB deployments Phase 1 returns 501 `not_implemented_on_cloud`. SQLite pilot host returns full counts.
      security:
        - ApiKeyAuth: []
        - FeedbackSessionCookie: []
      parameters:
        - name: org_id
          in: query
          required: false
          description: Organization identifier. Omit when `API_KEY_ORG_ID` env override is set (local/test).
          schema:
            type: string
        - name: older_than_days
          in: query
          required: false
          description: Only count decisions at least this many days old. Default 3. Non-finite or negative values normalize to the default.
          schema:
            type: integer
            default: 3
      responses:
        '200':
          description: Pending counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingFeedbackResponse'
        '501':
          description: Not implemented on cloud path (Phase 1)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingNotImplementedResponse'
        '401':
          description: Missing session or API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackAuthError'

  /v1/receipts:
    get:
      tags: [Decision]
