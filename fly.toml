# Fly.io template (Decision 1 Option A). App name is set when Decision 1 lands
# (e.g. fly launch --name 8p3p-pilot-springs).
#
# Persistence ladder (2026-05-15 CEO direction):
#   * Dry run only      → leave [[mounts]] commented; SQLite under /app/data is ephemeral,
#                         re-seed per dry-run-script.md § Saturday 12:00–12:45 PM pre-flight.
#   * Real pilot (≥1wk) → uncomment [[mounts]] below + set min_machines_running = 1;
#                         see docs/guides/operators/pilot-host-deployment.md § 7 Pilot persistence.
#   * Production        → migrate to AWS deployment (DynamoDB) per docs/specs/aws-deployment.md
#                         once tripwires in § 7 are hit.

# Template — app name filled Thursday evening when Decision 1 lands.
# app = "8p3p-pilot-springs"  # set via: fly launch --name 8p3p-pilot-springs
# Primary region (single machine). Fly: `dfw`/`iad` are “solid bets”; check `fly platform regions`.
# Ref: https://fly.io/docs/machines/guides-examples/machine-placement/ — https://fly.io/docs/reference/regions/
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

# API-only image — no dashboard bundle. Decision Panel deploys separately (dashboard/).

[env]
  PORT = "3000"
  LOG_LEVEL = "info"
  API_KEY_ORG_ID = "springs"
  DECISION_POLICY_PATH = "./src/decision/policies/default.json"
  DASHBOARD_SESSION_TTL_HOURS = "8"

# Runtime secrets (not in fly.toml — set via `fly secrets set`):
#   API_KEY, ADMIN_API_KEY
# Dashboard secrets (DASHBOARD_ACCESS_CODE, COOKIE_SECRET, CONTROL_LAYER_*) live on the Next.js host — see dashboard/.env.example

[http_service]
  internal_port = 3000
  force_https = true
  # Dry run: keep scale-to-zero for ~$5/month.
  # Real pilot (≥1 week): set auto_stop_machines = "off" and min_machines_running = 1
  # (Fly Volumes are region-pinned to a single machine — see § 7 Pilot persistence).
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for SQLite — UNCOMMENT for any pilot longer than the Springs dry run.
# Provision once: `fly volumes create data --region dfw --size 3`.
# Persistence recipe + backup cron + tripwires: docs/guides/operators/pilot-host-deployment.md § 7.
#
# [[mounts]]
#   source      = "data"
#   destination = "/app/data"
